name: Build and Test

on:
  push:
  pull_request:

jobs:
  build:
    name: Build (wasm32-wasip2) + Test (native)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: clippy,rustfmt

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (all targets)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test --lib (native)
        run: cargo test --lib

      - name: cargo build --release (wasm32-wasip2)
        run: cargo build --target wasm32-wasip2 --release
